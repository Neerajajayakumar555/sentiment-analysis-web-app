<!DOCTYPE html>
<html>
<head>
    <title>Sentiment Analysis Web App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>Sentiment Analysis Web App</h1>

    <form method="POST">
        <textarea name="text" placeholder="Enter your text here..." required></textarea>
        <br>
        <button type="submit">Check Sentiment</button>
    </form>

    {% if sentiment %}
    <div class="result">
        <h2>{{ sentiment }}</h2>
    </div>
    {% endif %}
</div>

</body>
</html>
